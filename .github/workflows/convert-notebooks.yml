name: Convert Notebooks to HTML

on:
  push:
    branches: [main]
    paths:
      - "tutorials/notebooks/*.ipynb"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nbconvert
        run: pip install nbconvert

      - name: Convert notebooks to HTML
        run: |
          find tutorials/notebooks -name "*.ipynb" | while read nb; do
            echo "Converting $nb"
            jupyter nbconvert --to html --embed-images "$nb"
          done

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tutorials/notebooks/*.html
          git diff --staged --quiet || git commit -m "auto: convert notebooks to HTML [skip ci]"
          git push
