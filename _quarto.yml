project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "**/*.md"
  resources:
    - data/
    - tutorials/notebooks/
    - assets/frames/
    # used by the dark-mode logo swap in CSS (not referenced from any .qmd)
    - assets/images/CompOmics_neg.png
    # tool logos are referenced from JS (built at runtime), so Quarto's static
    # analysis can't detect them — copy the whole folder explicitly
    - assets/images/tools/

website:
  title: "CompOmics"
  description: "Computational Proteomics — Ghent University / VIB"
  favicon: assets/images/favicon.png
  site-url: https://compomics.github.io
  # default social-preview image (per-page title/description come from front matter)
  image: /assets/images/CompOmics_logo.png
  open-graph: true
  twitter-card:
    card-style: summary

  navbar:
    logo: assets/images/CompOmics_logo.png
    logo-alt: "CompOmics"
    title: false
    right:
      - text: "Research"
        href: research/index.qmd
      - text: "Tools"
        href: tools/index.qmd
      - text: "Team"
        href: team/index.qmd
      - text: "Publications"
        href: publications/index.qmd
      - text: "Tutorials"
        href: tutorials/index.qmd
      - text: "News"
        href: news/index.qmd
      - icon: github
        href: https://github.com/compomics
        aria-label: GitHub

  page-footer:
    left: "© CompOmics — Ghent University / VIB"
    right:
      - text: "GitHub"
        href: https://github.com/compomics

format:
  html:
    theme:
      light: [flatly, assets/compomics-light.scss, assets/compomics.scss, team/teams.scss, research/research.scss, tools/tools.scss, publications/publications.scss, tutorials/tutorials.scss]
      dark: [darkly, assets/compomics-dark.scss, assets/compomics.scss, team/teams.scss, research/research.scss, tools/tools.scss, publications/publications.scss, tutorials/tutorials.scss]
    toc: true
    toc-depth: 2
    code-fold: false
    code-tools: false
    highlight-style: github
    include-after-body:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          document.querySelectorAll('a[href]').forEach(function(a) {
            var href = a.getAttribute('href');
            if (href && (href.startsWith('http://') || href.startsWith('https://')) && !href.includes(location.hostname)) {
              a.setAttribute('target', '_blank');
              a.setAttribute('rel', 'noopener noreferrer');
            }
          });
        });
        </script>

execute:
  freeze: auto